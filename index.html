<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Paprika Keşif">
<title>Paprika Reklamcılık Keşif</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#C0392B; --pr2:#E74C3C; --pr-bg:#FDF2F2; --pr-bd:#F5B7B1;
  --bg:#F2F3F5; --card:#FFFFFF; --card2:#F9FAFB;
  --bd:#E4E7EC; --bd2:#D0D5DD;
  --txt:#101828; --txt2:#344054; --txt3:#667085; --txt4:#98A2B3;
  --grn:#12B76A; --grn-bg:#ECFDF3; --grn-bd:#A6F4C5;
  --ylw:#DC6803; --ylw-bg:#FFFAEB; --ylw-bd:#FDE08D;
  --blu:#1570EF; --blu-bg:#EFF8FF; --blu-bd:#B2DDFF;
  --red:#D92D20; --red-bg:#FEF3F2; --red-bd:#FECDCA;
  --cam:#026AA2; --cam-bg:#F0F9FF; --cam-bd:#B9E6FE;
  --sh:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --r:14px; --r2:10px; --r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--txt);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
.app{width:100%;max-width:430px;height:100%;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}

/* --- BURASI DÜZELTİLDİ: EKRAN KAYMASINI ÖNLEYEN KRİTİK ALAN --- */
.scr {
  position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg);
  transform:translateX(105%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:1; will-change:transform; visibility:hidden; /* Gizli ekranlar render edilmez */
}
.scr.active{
  transform:translateX(0); z-index:10; visibility:visible; /* Aktif ekran en üstte ve görünür */
}
.scr.behind{
  transform:translateX(-10%); z-index:0; visibility:hidden;
}
/* ---------------------------------------------------------- */

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:86px;}
.scroll::-webkit-scrollbar{display:none;}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;}
.topbar-logo{font-size:20px;font-weight:900;color:var(--txt);letter-spacing:-.3px;}
.topbar-logo em{color:var(--pr);font-style:normal;}
.topbar-flex{flex:1;}
.topbar-title{font-size:16px;font-weight:800;color:var(--txt);}
.topbar-back{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--txt2);flex-shrink:0;transition:.12s;}
.topbar-back:active{background:var(--bd);}
.topbar-action{font-size:12px;font-weight:800;color:var(--pr);cursor:pointer;padding:6px 12px;border-radius:8px;background:var(--pr-bg);border:1px solid var(--pr-bd);transition:.12s;white-space:nowrap;}
.topbar-action:active{opacity:.7;}
.bnav{position:absolute;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom,0px));background:var(--card);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 16px rgba(16,24,40,.06);z-index:10;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:12px;transition:.12s;flex:1;}
.ni .ico{font-size:22px;opacity:.45;}
.ni .lbl{font-size:10px;font-weight:700;color:var(--txt4);letter-spacing:.2px;}
.ni.on .ico{opacity:1;}
.ni.on .lbl{color:var(--pr);}
.fab-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;}
.fab{width:52px;height:52px;background:linear-gradient(145deg,var(--pr),var(--pr2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(192,57,43,.45);transition:.15s;margin-top:-14px;}
.fab:active{transform:scale(.92);}
.fab-lbl{font-size:10px;font-weight:700;color:var(--pr);}
.stats{display:flex;gap:10px;padding:14px 16px 10px;}
.sc{flex:1;background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--bd);box-shadow:var(--sh);}
.sn{font-size:26px;font-weight:900;color:var(--txt);line-height:1;}
.sl{font-size:10px;color:var(--txt3);margin-top:3px;font-weight:700;display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sec-lbl{font-size:11px;font-weight:800;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;padding:6px 16px;}
.gps-bar{margin:4px 16px 8px;background:var(--blu-bg);border:1px solid var(--blu-bd);border-radius:var(--r2);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--blu);font-weight:700;}
.pcard{margin:0 14px 10px;background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--bd);box-shadow:var(--sh);cursor:pointer;transition:.15s;position:relative;overflow:hidden;}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:var(--pr);}
.pn{font-size:14px;font-weight:800;color:var(--txt);line-height:1.3;}
.pc{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:600;}

/* V3 Form Elemanları */
.fsec{background:var(--card);margin:0 0 10px;padding:16px;}
.fst{font-size:12px;font-weight:800;color:var(--pr);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ig{margin-bottom:12px;}
.il{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
.if{width:100%;background:var(--card2);border:1.5px solid var(--bd2);border-radius:var(--r3);padding:11px 13px;color:var(--txt);font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:.15s;}
.if:focus{border-color:var(--pr);background:#fff;}

.pzone{border:2px dashed var(--bd2);border-radius:var(--r2);padding:18px 14px;text-align:center;background:var(--card2);transition:.15s;cursor:pointer;position:relative;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
.pthumb{aspect-ratio:1;border-radius:var(--r3);background:var(--bd);overflow:hidden;position:relative;}
.pthumb img{width:100%;height:100%;object-fit:cover;}
.pthumb-del{position:absolute;top:4px;right:4px;background:rgba(217,45,32,.9);border-radius:5px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800;}

.abtn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(145deg,var(--pr),var(--pr2));border:none;border-radius:var(--r2);padding:14px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;width:100%;box-shadow:0 4px 12px rgba(192,57,43,.35);}
.abtn:active{transform:scale(.97);}

/* Paylaşım Listesi Özel Kart */
.scard{margin:0 14px 10px;background:var(--card);border-radius:var(--r);padding:14px;border:1.5px solid var(--bd);box-shadow:var(--sh);display:flex;align-items:center;gap:12px;}
.edit-badge{background:var(--pr-bg);border:1px solid var(--pr-bd);color:var(--pr);font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;cursor:pointer;margin-left:auto;}
</style>
</head>
<body>

<div class="app">

<div class="scr active" id="s-home">
  <div class="topbar">
    <div class="topbar-logo">PAPRİKA<em>KEŞİF</em></div>
    <div class="topbar-flex"></div>
    <div class="topbar-action" onclick="go('s-new')">+ Yeni Proje</div>
  </div>
  <div class="scroll">
    <div class="stats">
      <div class="sc"><div class="sn" id="stat-total">0</div><div class="sl">Toplam</div></div>
      <div class="sc"><div class="sn" id="stat-wait">0</div><div class="sl">Devam</div></div>
      <div class="sc"><div class="sn" id="stat-done">0</div><div class="sl">Bitti</div></div>
    </div>
    <div class="gps-bar">📍 Konum Aktif</div>
    <div class="sec-lbl">PROJELERİM</div>
    <div id="proj-list"></div>
  </div>
  <div class="bnav">
    <div class="ni on" onclick="go('s-home')"><div class="ico">🏠</div><div class="lbl">Ana Sayfa</div></div>
    <div class="fab-wrap" onclick="go('s-new')"><div class="fab">➕</div><div class="fab-lbl">YENİ</div></div>
    <div class="ni" onclick="go('s-share-list')"><div class="ico">📤</div><div class="lbl">Paylaş</div></div>
  </div>
</div>

<div class="scr" id="s-new">
  <div class="topbar">
    <div class="topbar-back" onclick="back()">←</div>
    <div class="topbar-flex" style="padding-left:10px"><div class="topbar-title" id="new-screen-title">Yeni Proje</div></div>
    <div class="topbar-action" onclick="saveProject()">Kaydet</div>
  </div>
  <div class="scroll">
     <div class="fsec">
        <div class="ig"><div class="il">Müşteri Adı</div><input class="if" id="f-client" placeholder="Müşteri adı..."></div>
        <div class="ig"><div class="il">Proje Adı</div><input class="if" id="f-project" placeholder="İşin adı..."></div>
     </div>
     <div class="fsec">
        <div class="fst">📸 Fotoğraflar</div>
        <div class="pzone" onclick="document.getElementById('f-img').click()">
            <div style="font-size:24px">📷</div>
            <div style="font-weight:700">Fotoğraf Çek veya Yükle</div>
            <input type="file" id="f-img" multiple accept="image/*" style="display:none" onchange="handleImgs(this)">
        </div>
        <div class="pgrid" id="pgrid"></div>
     </div>
     <div style="padding:16px"><button class="abtn" onclick="saveProject()">PROJEYİ KAYDET</button></div>
  </div>
</div>

<div class="scr" id="s-share-list">
  <div class="topbar">
    <div class="topbar-back" onclick="go('s-home')">←</div>
    <div class="topbar-flex" style="padding-left:10px"><div class="topbar-title">Paylaşım Merkezi</div></div>
  </div>
  <div class="scroll" id="share-list-cont"></div>
</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem('paprika_projs') || '[]');
let currentImgs = [];
let editingId = null;

// KRİTİK: EKRAN GEÇİŞLERİNİ DÜZENLEYEN FONKSİYON
function go(id) {
  const allScreens = document.querySelectorAll('.scr');
  const target = document.getElementById(id);
  const currentActive = document.querySelector('.scr.active');

  // Mevcut aktif ekranı behind yap
  if(currentActive) {
    currentActive.classList.remove('active');
    currentActive.classList.add('behind');
  }

  // Diğer her şeyi temizle
  allScreens.forEach(s => {
    if(s.id !== id) {
        s.classList.remove('active');
        s.style.visibility = 'hidden'; // Arka plan sızmasını kesin olarak engeller
    }
  });

  // Hedef ekranı göster
  target.style.visibility = 'visible';
  target.classList.remove('behind');
  target.classList.add('active');

  // İlgili renderları tetikle
  if(id === 's-home') renderHome();
  if(id === 's-share-list') renderShareList();
}

function back() { resetForm(); go('s-home'); }

function handleImgs(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { currentImgs.push(e.target.result); renderImgs(); };
    reader.readAsDataURL(file);
  });
}

function renderImgs() {
  const grid = document.getElementById('pgrid');
  grid.innerHTML = currentImgs.map((img, i) => `
    <div class="pthumb">
      <img src="${img}">
      <div class="pthumb-del" onclick="removeImg(${i})">✕</div>
    </div>
  `).join('');
}

function removeImg(i) { currentImgs.splice(i, 1); renderImgs(); }

function saveProject() {
  const client = document.getElementById('f-client').value;
  const project = document.getElementById('f-project').value;
  if(!client || !project) return alert("Eksik alanları doldurun");

  const data = { id: editingId || Date.now(), client, project, imgs: currentImgs };
  if(editingId) projects = projects.map(p => p.id === editingId ? data : p);
  else projects.unshift(data);

  localStorage.setItem('paprika_projs', JSON.stringify(projects));
  back();
}

function editProject(id) {
  const p = projects.find(x => x.id == id);
  if(!p) return;
  editingId = id;
  document.getElementById('new-screen-title').innerText = "Projeyi Düzenle";
  document.getElementById('f-client').value = p.client;
  document.getElementById('f-project').value = p.project;
  currentImgs = [...(p.imgs || [])];
  renderImgs();
  go('s-new');
}

function resetForm() {
  editingId = null;
  currentImgs = [];
  document.getElementById('f-client').value = '';
  document.getElementById('f-project').value = '';
  document.getElementById('pgrid').innerHTML = '';
  document.getElementById('new-screen-title').innerText = "Yeni Proje";
}

function renderHome() {
  const list = document.getElementById('proj-list');
  list.innerHTML = projects.map(p => `
    <div class="pcard" onclick="editProject(${p.id})">
      <div class="pn">${p.project}</div>
      <div class="pc">${p.client}</div>
    </div>
  `).join('');
  document.getElementById('stat-total').innerText = projects.length;
}

function renderShareList() {
  const cont = document.getElementById('share-list-cont');
  cont.innerHTML = projects.map(p => `
    <div class="scard">
      <div>
        <div style="font-weight:800; font-size:14px">${p.project}</div>
        <div style="font-size:11px; color:var(--txt3)">${p.client}</div>
      </div>
      <div class="edit-badge" onclick="editProject(${p.id})">DÜZENLE</div>
    </div>
  `).join('');
}

renderHome();
</script>
</body>
</html>
