<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Paprika Keşif">
<title>Paprika Reklamcılık Keşif</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#C0392B; --pr2:#E74C3C; --pr-bg:#FDF2F2; --pr-bd:#F5B7B1;
  --bg:#F2F3F5; --card:#FFFFFF; --card2:#F9FAFB;
  --bd:#E4E7EC; --bd2:#D0D5DD;
  --txt:#101828; --txt2:#344054; --txt3:#667085; --txt4:#98A2B3;
  --grn:#12B76A; --grn-bg:#ECFDF3; --grn-bd:#A6F4C5;
  --ylw:#DC6803; --ylw-bg:#FFFAEB; --ylw-bd:#FDE08D;
  --blu:#1570EF; --blu-bg:#EFF8FF; --blu-bd:#B2DDFF;
  --red:#D92D20; --red-bg:#FEF3F2; --red-bd:#FECDCA;
  --cam:#026AA2; --cam-bg:#F0F9FF; --cam-bd:#B9E6FE;
  --sh:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --r:14px; --r2:10px; --r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--txt);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
.app{width:100%;max-width:430px;height:100%;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}

/* DÜZENLEME: Ekran geçişleri ve görünürlük iyileştirmesi */
.scr {
  position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);
  transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:1;will-change:transform;visibility:hidden;
}
.scr.active{transform:translateX(0);z-index:10;visibility:visible;}
.scr.behind{transform:translateX(-10%);z-index:0;visibility:hidden;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:86px;}
.scroll::-webkit-scrollbar{display:none;}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;}
.topbar-logo{font-size:20px;font-weight:900;color:var(--txt);letter-spacing:-.3px;}
.topbar-logo em{color:var(--pr);font-style:normal;}
.topbar-flex{flex:1;}
.topbar-title{font-size:16px;font-weight:800;color:var(--txt);}
.topbar-back{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--txt2);flex-shrink:0;transition:.12s;}
.topbar-back:active{background:var(--bd);}
.topbar-action{font-size:12px;font-weight:800;color:var(--pr);cursor:pointer;padding:6px 12px;border-radius:8px;background:var(--pr-bg);border:1px solid var(--pr-bd);transition:.12s;white-space:nowrap;}
.topbar-action:active{opacity:.7;}
.bnav{position:absolute;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom,0px));background:var(--card);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 16px rgba(16,24,40,.06);z-index:10;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:12px;transition:.12s;flex:1;}
.ni .ico{font-size:22px;opacity:.45;}
.ni .lbl{font-size:10px;font-weight:700;color:var(--txt4);letter-spacing:.2px;}
.ni.on .ico{opacity:1;}
.ni.on .lbl{color:var(--pr);}
.fab-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;}
.fab{width:52px;height:52px;background:linear-gradient(145deg,var(--pr),var(--pr2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(192,57,43,.45);transition:.15s;margin-top:-14px;}
.fab:active{transform:scale(.92);}
.fab-lbl{font-size:10px;font-weight:700;color:var(--pr);}
.stats{display:flex;gap:10px;padding:14px 16px 10px;}
.sc{flex:1;background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--bd);box-shadow:var(--sh);}
.sn{font-size:26px;font-weight:900;color:var(--txt);line-height:1;}
.sl{font-size:10px;color:var(--txt3);margin-top:3px;font-weight:700;display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sec-lbl{font-size:11px;font-weight:800;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;padding:6px 16px;}
.gps-bar{margin:4px 16px 8px;background:var(--blu-bg);border:1px solid var(--blu-bd);border-radius:var(--r2);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--blu);font-weight:700;}
.pcard{margin:0 14px 10px;background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--bd);box-shadow:var(--sh);cursor:pointer;transition:.15s;position:relative;overflow:hidden;}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.pcard.sy::before{background:var(--ylw);}
.pcard.sg::before{background:var(--grn);}
.pcard.sb::before{background:var(--blu);}
.pcard.sr::before{background:var(--red);}
.pcard:active{transform:scale(.985);box-shadow:none;}
.pt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.pn{font-size:14px;font-weight:800;color:var(--txt);line-height:1.3;}
.pc{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:600;}
.badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;border:1px solid;}
.by{background:var(--ylw-bg);color:var(--ylw);border-color:var(--ylw-bd);}
.bg{background:var(--grn-bg);color:var(--grn);border-color:var(--grn-bd);}
.bb{background:var(--blu-bg);color:var(--blu);border-color:var(--blu-bd);}
.br{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.chip{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--txt2);font-weight:700;}
.chip b{color:var(--pr);}
.chip.cam-c{background:var(--cam-bg);border-color:var(--cam-bd);color:var(--cam);}
.pf{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.ploc{font-size:10px;color:var(--txt3);font-weight:600;display:flex;align-items:center;gap:3px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pph{font-size:10px;color:var(--pr);font-weight:800;white-space:nowrap;}
.pdt{font-size:10px;color:var(--txt4);white-space:nowrap;}
.fsec{background:var(--card);margin:0 0 10px;padding:16px;}
.fst{font-size:12px;font-weight:800;color:var(--pr);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ig{margin-bottom:12px;}
.ig:last-child{margin-bottom:0;}
.il{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
.if{width:100%;background:var(--card2);border:1.5px solid var(--bd2);border-radius:var(--r3);padding:11px 13px;color:var(--txt);font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:.15s;-webkit-appearance:none;}
.if:focus{border-color:var(--pr);background:#fff;box-shadow:0 0 0 3px var(--pr-bg);}
.if::placeholder{color:var(--txt4);}
select.if{cursor:pointer;}
textarea.if{resize:none;height:72px;line-height:1.5;}
.drow{display:flex;gap:8px;}
.drow .ig{flex:1;margin-bottom:0;}
.tcsel{display:flex;flex-wrap:wrap;gap:7px;}
.tc{padding:7px 13px;background:var(--bg);border:1.5px solid var(--bd2);border-radius:var(--r3);font-size:12px;font-weight:700;color:var(--txt3);cursor:pointer;transition:.12s;user-select:none;-webkit-user-select:none;}
.tc.on{background:var(--pr-bg);border-color:var(--pr);color:var(--pr);}
.tc.cam-on{background:var(--cam-bg);border-color:var(--cam-bd);color:var(--cam);}
.sign-block{background:var(--card);border-radius:var(--r);border:1.5px solid var(--bd);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.sign-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--bd);cursor:pointer;}
.sign-num{width:26px;height:26px;border-radius:8px;background:var(--pr);color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sign-lbl{font-size:13px;font-weight:800;color:var(--txt);flex:1;}
.sign-type-tag{font-size:10px;font-weight:700;color:var(--txt3);}
.sign-del{font-size:18px;cursor:pointer;padding:2px 4px;color:var(--txt4);transition:.12s;}
.sign-del:active{color:var(--red);}
.sign-body{padding:14px;}
.pzone{border:2px dashed var(--bd2);border-radius:var(--r2);padding:18px 14px;text-align:center;background:var(--card2);transition:.15s;position:relative;overflow:hidden;cursor:pointer;}
.pzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzone:active,.pzone:hover{border-color:var(--pr);background:var(--pr-bg);}
.pz-ico{font-size:28px;margin-bottom:4px;}
.pz-txt{font-size:13px;color:var(--txt2);font-weight:700;}
.pz-sub{font-size:11px;color:var(--txt4);margin-top:2px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
.pthumb{aspect-ratio:1;border-radius:var(--r3);background:var(--bd);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.pthumb img{width:100%;height:100%;object-fit:cover;}
.pthumb-del{position:absolute;top:4px;right:4px;background:rgba(217,45,32,.9);border-radius:5px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;font-weight:800;}
.pthumb-note{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);padding:3px 5px;font-size:9px;color:#fff;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pthumb-ann{position:absolute;top:4px;left:4px;background:rgba(192,57,43,.85);border-radius:5px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;}
.pthumb-has-ann{position:absolute;bottom:18px;left:0;right:0;background:rgba(192,57,43,.7);padding:2px 4px;font-size:8px;color:#fff;font-weight:800;text-align:center;}
.abtn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(145deg,var(--pr),var(--pr2));border:none;border-radius:var(--r2);padding:14px 18px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;box-shadow:0 4px 12px rgba(192,57,43,.35);transition:.14s;}
.abtn:active{transform:scale(.97);box-shadow:none;}
.abtn.ghost{background:var(--bg);color:var(--txt2);border:1.5px solid var(--bd2);box-shadow:var(--sh);}
.scard{margin:0 14px 10px;background:var(--card);border-radius:var(--r);padding:14px;border:1.5px solid var(--bd);box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;gap:12px;transition:.14s;}
.scard:active{transform:scale(.97);box-shadow:none;}
.sico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.sinfo{flex:1;}
.sname{font-weight:800;font-size:14px;color:var(--txt);}
.sdesc{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:600;}
.sarr{color:var(--txt4);font-size:18px;font-weight:700;}
.toast{position:absolute;top:60px;left:14px;right:14px;background:var(--grn);border-radius:var(--r2);padding:11px 14px;font-size:13px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;z-index:999;transform:translateY(-100px);opacity:0;transition:.3s;pointer-events:none;box-shadow:0 6px 16px rgba(18,183,106,.4);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{background:var(--red);box-shadow:0 6px 16px rgba(217,45,32,.4);}
.mrow-wrap{display:flex;flex-direction:column;gap:8px;}
.mrow{background:var(--card2);border:1.5px solid var(--bd);border-radius:var(--r3);padding:10px 12px;position:relative;}
.mrow-num{position:absolute;top:8px;left:10px;width:20px;height:20px;border-radius:6px;background:var(--pr);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mrow-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:6px;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;}
.mrow-del:active{background:var(--red);color:#fff;}
.mrow-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;}
.mrow-note{margin-top:6px;}
.mrow-add{display:flex;align-items:center;justify-content:center;gap:6px;border:2px dashed var(--pr-bd);border-radius:var(--r3);padding:10px;cursor:pointer;color:var(--pr);font-size:12px;font-weight:800;background:var(--pr-bg);transition:.12s;}
.mrow-add:active{opacity:.7;}

.ann-overlay{position:fixed;inset:0;z-index:9999;background:#000;display:none;flex-direction:column;}
.ann-overlay.open{display:flex;}
.ann-toolbar{background:#1a1a1a;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid #333;}
.ann-btn{padding:6px 12px;border-radius:8px;border:1px solid #444;background:#2a2a2a;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:.12s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.ann-btn:active{background:#444;}
.ann-btn.active-tool{background:var(--pr);border-color:var(--pr);}
.ann-btn.save-btn{background:var(--grn);border-color:var(--grn);margin-left:auto;}
.ann-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;position:relative;}
#ann-canvas{cursor:crosshair;display:block;touch-action:none;}
.ann-tools-row{background:#1a1a1a;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-top:1px solid #333;overflow-x:auto;}
.ann-color{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.12s;flex-shrink:0;}
.ann-color.active{border-color:#fff;}
.ann-size{display:flex;align-items:center;gap:6px;color:#aaa;font-size:11px;font-weight:700;}
.ann-size input[type=range]{width:80px;accent-color:var(--pr);}

.edit-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--ylw-bg);border:1px solid var(--ylw-bd);
  color:var(--ylw);font-size:10px;font-weight:800;
  padding:2px 9px;border-radius:20px;cursor:pointer;
}
</style>
</head>
<body>

<div class="app">
<div class="toast" id="toast">✅ <span id="tmsg">Tamam</span></div>

<div class="scr active" id="s-home">
  <div class="topbar">
    <div>
      <div class="topbar-logo">PAPRİKA<em>KEŞİF</em></div>
      <div style="font-size:10px;color:var(--txt3);font-weight:600;">Reklamcılık Saha Ölçüm & Yönetim</div>
    </div>
    <div class="topbar-flex"></div>
    <div class="topbar-action" onclick="go('s-new')">+ Yeni Proje</div>
  </div>
  <div class="scroll">
    <div class="stats">
      <div class="sc"><div class="sn" id="stat-total">0</div><div class="sl"><span class="sdot" style="background:var(--blu)"></span>Toplam</div></div>
      <div class="sc"><div class="sn" id="stat-wait">0</div><div class="sl"><span class="sdot" style="background:var(--ylw)"></span>Devam</div></div>
      <div class="sc"><div class="sn" id="stat-done">0</div><div class="sl"><span class="sdot" style="background:var(--grn)"></span>Bitti</div></div>
    </div>
    <div class="gps-bar" id="gps-bar">📍 Konum alınıyor...</div>
    <div class="sec-lbl">PROJELERİM</div>
    <div id="proj-list"></div>
  </div>
  <div class="bnav">
    <div class="ni on" onclick="go('s-home')"><div class="ico">🏠</div><div class="lbl">Ana Sayfa</div></div>
    <div class="fab-wrap" onclick="go('s-new')"><div class="fab">➕</div><div class="fab-lbl">YENİ</div></div>
    <div class="ni" onclick="go('s-share-list')"><div class="ico">📤</div><div class="lbl">Paylaş</div></div>
  </div>
</div>

<div class="scr" id="s-new">
  <div class="topbar">
    <div class="topbar-back" onclick="back()">←</div>
    <div class="topbar-flex" style="padding-left:10px"><div class="topbar-title" id="new-title">Yeni Proje</div></div>
    <div class="topbar-action" onclick="saveProject()">Kaydet</div>
  </div>
  <div class="scroll">
     <div class="fsec">
        <div class="ig"><div class="il">Müşteri Adı</div><input class="if" id="f-client" placeholder="Müşteri adı..."></div>
        <div class="ig"><div class="il">Proje Adı</div><input class="if" id="f-project" placeholder="İşin adı..."></div>
     </div>
     <div class="fsec">
        <div class="fst">📸 Fotoğraflar</div>
        <div class="pzone" onclick="document.getElementById('f-img').click()">
            <div class="pz-ico">📷</div>
            <div class="pz-txt">Fotoğraf Çek veya Yükle</div>
            <input type="file" id="f-img" multiple accept="image/*" style="display:none" onchange="handleImgs(this)">
        </div>
        <div class="pgrid" id="pgrid"></div>
     </div>
     <div style="padding:16px"><button class="abtn" onclick="saveProject()">PROJEYİ KAYDET</button></div>
  </div>
</div>

<div class="scr" id="s-share-list">
  <div class="topbar">
    <div class="topbar-back" onclick="go('s-home')">←</div>
    <div class="topbar-flex" style="padding-left:10px"><div class="topbar-title">Projeleri Paylaş</div></div>
  </div>
  <div class="scroll" id="share-list-cont"></div>
</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem('paprika_projs') || '[]');
let currentImgs = [];
let editingId = null;

// GÜÇLENDİRİLMİŞ EKRAN GEÇİŞ FONKSİYONU
function go(id) {
  const allScreens = document.querySelectorAll('.scr');
  const target = document.getElementById(id);
  const activeNow = document.querySelector('.scr.active');

  // 1. Mevcut ekranı 'behind' yap veya kaldır
  if (activeNow) {
    activeNow.classList.remove('active');
    activeNow.classList.add('behind');
  }

  // 2. Diğer tüm ekranları temizle (Çakışmayı önleyen ana kısım)
  allScreens.forEach(s => {
    if (s.id !== id) {
      s.classList.remove('active');
      // Paylaşım ekranı veya diğerleri arkaplanda görünmesin diye 'behind' ekliyoruz
      if (s !== activeNow) s.classList.remove('behind'); 
    }
  });

  // 3. Hedef ekranı aktif et
  target.classList.remove('behind');
  target.classList.add('active');

  // Menü durumlarını güncelle
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  if (id === 's-home') document.querySelectorAll('.ni')[0].classList.add('on');
  if (id === 's-share-list') document.querySelectorAll('.ni')[1].classList.add('on');
  
  if (id === 's-share-list') renderShareList();
}

function back() {
  go('s-home');
  resetForm();
}

function resetForm() {
  editingId = null;
  currentImgs = [];
  document.getElementById('f-client').value = '';
  document.getElementById('f-project').value = '';
  document.getElementById('pgrid').innerHTML = '';
  document.getElementById('new-title').innerText = 'Yeni Proje';
}

function handleImgs(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentImgs.push(e.target.result);
      renderImgs();
    };
    reader.readAsDataURL(file);
  });
}

function renderImgs() {
  const grid = document.getElementById('pgrid');
  grid.innerHTML = currentImgs.map((img, i) => `
    <div class="pthumb">
      <img src="${img}">
      <div class="pthumb-del" onclick="removeImg(${i})">✕</div>
    </div>
  `).join('');
}

function removeImg(i) {
  currentImgs.splice(i, 1);
  renderImgs();
}

function saveProject() {
  const client = document.getElementById('f-client').value;
  const project = document.getElementById('f-project').value;

  if (!client || !project) return showToast('Lütfen alanları doldurun', true);

  const data = {
    id: editingId || Date.now(),
    client,
    project,
    imgs: currentImgs,
    date: new Date().toLocaleDateString('tr-TR')
  };

  if (editingId) {
    projects = projects.map(p => p.id === editingId ? data : p);
  } else {
    projects.unshift(data);
  }

  localStorage.setItem('paprika_projs', JSON.stringify(projects));
  showToast('Proje Kaydedildi');
  renderHome();
  back();
}

function editProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;

  editingId = id;
  document.getElementById('f-client').value = p.client;
  document.getElementById('f-project').value = p.project;
  currentImgs = [...(p.imgs || [])];
  renderImgs();
  document.getElementById('new-title').innerText = 'Projeyi Düzenle';
  go('s-new');
}

function renderHome() {
  const list = document.getElementById('proj-list');
  list.innerHTML = projects.map(p => `
    <div class="pcard" onclick="editProject(${p.id})">
      <div class="pn">${p.project}</div>
      <div class="pc">${p.client}</div>
      <div class="pdt">${p.date}</div>
    </div>
  `).join('');
  
  document.getElementById('stat-total').innerText = projects.length;
}

function renderShareList() {
  const cont = document.getElementById('share-list-cont');
  cont.innerHTML = projects.map(p => `
    <div class="scard" onclick="showToast('Paylaşılıyor...')">
      <div class="sico" style="background:var(--pr-bg)">📂</div>
      <div class="sinfo">
        <div class="sname">${p.project}</div>
        <div class="sdesc">${p.client}</div>
      </div>
      <div class="edit-badge" onclick="event.stopPropagation(); editProject(${p.id})">✏️ Düzenle</div>
    </div>
  `).join('');
}

function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.className = 'toast show' + (err ? ' err' : '');
  document.getElementById('tmsg').innerText = msg;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Başlangıç
renderHome();
</script>
</body>
</html>
