<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TaberaField Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pr: #F97316; --pr-dark: #EA580C; --pr-bg: #FFF7ED; --pr-bd: #FFEDD5;
  --bg: #F8FAFC; --card: #FFFFFF; --bd: #E2E8F0; --txt: #0F172A; --txt2: #475569;
  --txt3: #94A3B8; --grn: #10B981; --blu: #3B82F6; --red: #EF4444; --cam: #0EA5E9;
  --sh: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--txt);overflow:hidden;height:100vh;}

/* APP CONTAINER */
.app{width:100%;max-width:430px;height:100%;margin:0 auto;position:relative;background:var(--bg);display:flex;flex-direction:column;box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);}

/* SCREEN SYSTEM */
.scr{position:absolute;inset:0;background:var(--bg);transform:translateX(100%);transition:transform .3s cubic-bezier(0.4,0,0.2,1);z-index:1;display:flex;flex-direction:column;}
.scr.active{transform:translateX(0);z-index:2;}
.scroll{flex:1;overflow-y:auto;padding-bottom:100px;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* TOPBAR */
.topbar{height:64px;background:#fff;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--bd);gap:15px;flex-shrink:0;}
.topbar-logo{font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.topbar-logo em{color:var(--pr);font-style:normal;}
.topbar-back{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;}

/* CARDS */
.pcard{margin:15px;background:#fff;border-radius:20px;padding:18px;border:1px solid var(--bd);box-shadow:var(--sh);cursor:pointer;position:relative;overflow:hidden;}
.pcard::after{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--pr);}
.pcard.sg::after{background:var(--grn);}

/* BUTTONS */
.abtn{background:linear-gradient(135deg, var(--pr), var(--pr-dark));color:#fff;border:none;padding:16px;border-radius:15px;font-weight:800;font-size:15px;width:100%;cursor:pointer;box-shadow:0 10px 15px -3px rgba(249,115,22,0.3);}
.abtn:active{transform:scale(0.98);}

/* FORM ELEMENTS */
.fsec{background:#fff;padding:20px;margin-bottom:10px;border-bottom:1px solid var(--bd);}
.if{width:100%;background:var(--bg);border:2px solid var(--bd);border-radius:12px;padding:12px;font-family:inherit;font-size:15px;outline:none;margin-top:5px;}
.if:focus{border-color:var(--pr);}

/* PDF & PRINT STYLES */
@media print {
    body, .app { background: white !important; height: auto !important; overflow: visible !important; width: 100% !important; max-width: none !important; }
    .bnav, .topbar, .toast, .fab-wrap, .abtn { display: none !important; }
    #pdf-doc { display: block !important; position: static !important; }
    .pdf-page { width: 100%; padding: 0; margin: 0; }
    .pdf-sign { page-break-inside: avoid; break-inside: avoid; border: 1px solid #eee; margin-bottom: 20px; }
}

#pdf-doc{display:none;position:fixed;inset:0;background:white;z-index:9999;overflow:auto;}
.pdf-page{padding:20px;max-width:800px;margin:0 auto;}
.pdf-header{display:flex;justify-content:space-between;border-bottom:3px solid var(--pr);padding-bottom:15px;margin-bottom:20px;}
.pdf-grid{display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;}
.pdf-item{background:#f8fafc; padding:12px; border-radius:10px;}
.pdf-label{font-size:10px; color:var(--txt3); text-transform:uppercase; font-weight:800;}
.pdf-val{font-size:14px; font-weight:800;}

.pdf-sign{border-radius:12px; overflow:hidden; border:1px solid var(--bd); margin-bottom:20px;}
.pdf-s-head{background:var(--pr); color:white; padding:10px 15px; font-weight:800; display:flex; justify-content:space-between;}
.pdf-s-body{padding:15px;}
.pdf-measures{display:flex; gap:10px; margin-bottom:15px;}
.pdf-m-box{flex:1; background:#f1f5f9; padding:10px; border-radius:8px; text-align:center;}
.pdf-m-val{font-size:18px; font-weight:900; color:var(--pr);}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;width:100%;height:70px;background:#fff;border-top:1px solid var(--bd);display:flex;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom);z-index:10;}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--txt3);cursor:pointer;}
.ni.on{color:var(--pr);}
.fab{width:55px;height:55px;background:var(--pr);border-radius:18px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin-top:-35px;box-shadow:0 8px 15px rgba(249,115,22,0.4);border:4px solid #fff;}

.pgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
.pthumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #eee; position: relative; }
.pthumb img { width: 100%; height: 100%; object-fit: cover; }

.toast{position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--txt); color:white; padding:12px 25px; border-radius:30px; font-weight:700; transition:0.4s; z-index:10000; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="toast" class="toast">İşlem Başarılı</div>

<div id="pdf-doc"><div class="pdf-page" id="pdf-content"></div></div>

<div class="app">
    <div class="scr active" id="s-home">
        <div class="topbar">
            <div class="topbar-logo">TABERA<em>FIELD</em></div>
            <div style="flex:1"></div>
            <div style="font-size:20px" onclick="location.reload()">🔄</div>
        </div>
        <div class="scroll">
            <div id="proj-list"></div>
        </div>
        <div class="bnav">
            <div class="ni on" onclick="go('s-home')">🏠<span style="font-size:10px">Ana Sayfa</span></div>
            <div class="fab" onclick="go('s-new')">＋</div>
            <div class="ni" onclick="go('s-home')">📋<span style="font-size:10px">Projeler</span></div>
        </div>
    </div>

    <div class="scr" id="s-new">
        <div class="topbar">
            <div class="topbar-back" onclick="back()">←</div>
            <div style="font-weight:800">Yeni Ölçüm Kaydı</div>
        </div>
        <div class="scroll">
            <div class="fsec">
                <label style="font-weight:800; font-size:12px; color:var(--pr)">MÜŞTERİ BİLGİLERİ</label>
                <input class="if" id="f-client" placeholder="Müşteri / Firma Adı">
                <input class="if" id="f-project" placeholder="Proje / İş Adı">
            </div>
            <div class="fsec">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <label style="font-weight:800; font-size:12px; color:var(--pr)">TABELALAR</label>
                    <button onclick="addSign()" style="background:var(--pr-bg); border:1px solid var(--pr-bd); color:var(--pr); padding:5px 12px; border-radius:8px; font-weight:800; font-size:12px">+ EKLE</button>
                </div>
                <div id="signs-container"></div>
            </div>
            <div style="padding:20px">
                <button class="abtn" onclick="saveProject()">💾 PROJEYİ KAYDET</button>
            </div>
        </div>
    </div>

    <div class="scr" id="s-share">
        <div class="topbar">
            <div class="topbar-back" onclick="back()">←</div>
            <div style="font-weight:800">Paylaşım Seçenekleri</div>
        </div>
        <div class="scroll" style="padding:20px">
            <div id="share-summary" style="background:#fff; padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid var(--bd)">
                <h3 id="sh-title" style="margin-bottom:5px">---</h3>
                <p id="sh-client" style="color:var(--txt3); font-size:14px">---</p>
            </div>
            
            <div style="display:grid; gap:15px">
                <button class="abtn" style="background:#25D366;" onclick="shareWhatsApp()">🟢 WhatsApp ile Gönder</button>
                <button class="abtn" style="background:#DC2626;" onclick="printPDF()">🔴 PDF Olarak Kaydet / Yazdır</button>
                <button class="abtn" style="background:#64748b;" onclick="copyText()">⚪ Metni Kopyala</button>
            </div>
        </div>
    </div>
</div>

<script>
let projects = JSON.parse(localStorage.getItem('tf_pro_data') || '[]');
let currentProjectIdx = null;
let signCount = 0;
let signPhotos = {};

function go(id) {
    document.querySelectorAll('.scr').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function back() { go('s-home'); }

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function addSign() {
    signCount++;
    const id = `sign-${signCount}`;
    signPhotos[id] = [];
    const div = document.createElement('div');
    div.className = 'fsec';
    div.style.border = '1px solid #eee';
    div.style.borderRadius = '15px';
    div.style.padding = '15px';
    div.style.marginBottom = '15px';
    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
            <span style="font-weight:900; color:var(--pr)">#${signCount}</span>
            <span onclick="this.parentElement.parentElement.remove()" style="color:var(--red); font-weight:800; cursor:pointer">SİL</span>
        </div>
        <input class="if" id="${id}-label" placeholder="Tabela Tanımı (Örn: Giriş Kapısı)">
        <select class="if" id="${id}-type">
            <option>Kutu Harf</option><option>Işıklı Tabela</option><option>Vinil Germe</option><option>Cam Folyo</option><option>Diğer</option>
        </select>
        <div style="display:flex; gap:10px; margin-top:10px">
            <input class="if" id="${id}-w" type="number" placeholder="En (m)">
            <input class="if" id="${id}-h" type="number" placeholder="Boy (m)">
        </div>
        <div style="margin-top:10px">
            <input type="file" accept="image/*" multiple onchange="handlePhotos('${id}', this)" style="font-size:12px">
            <div id="${id}-prev" class="pgrid"></div>
        </div>
    `;
    document.getElementById('signs-container').appendChild(div);
}

function handlePhotos(sid, input) {
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            signPhotos[sid].push(e.target.result);
            renderPrev(sid);
        };
        reader.readAsDataURL(file);
    });
}

function renderPrev(sid) {
    const cont = document.getElementById(`${sid}-prev`);
    cont.innerHTML = signPhotos[sid].map(src => `<div class="pthumb"><img src="${src}"></div>`).join('');
}

function saveProject() {
    const client = document.getElementById('f-client').value;
    const project = document.getElementById('f-project').value;
    if(!client) return toast("Müşteri adı boş olamaz!");

    const signs = [];
    document.querySelectorAll('#signs-container > div').forEach((div, idx) => {
        const id = `sign-${idx + 1}`;
        signs.push({
            label: document.getElementById(`${id}-label`)?.value || 'İsimsiz',
            type: document.getElementById(`${id}-type`)?.value,
            w: document.getElementById(`${id}-w`)?.value,
            h: document.getElementById(`${id}-h`)?.value,
            photos: signPhotos[id] || []
        });
    });

    projects.push({ client, project, signs, date: new Date().toLocaleString('tr-TR') });
    localStorage.setItem('tf_pro_data', JSON.stringify(projects));
    toast("Proje Başarıyla Kaydedildi!");
    renderHome();
    go('s-home');
}

function renderHome() {
    const list = document.getElementById('proj-list');
    if(projects.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:50px; color:#94a3b8">Henüz proje eklenmemiş.</div>`;
        return;
    }
    list.innerHTML = projects.map((p, i) => `
        <div class="pcard" onclick="openShare(${i})">
            <div style="font-weight:900; font-size:16px">${p.project || 'İsimsiz Proje'}</div>
            <div style="color:var(--txt2); font-size:13px">${p.client}</div>
            <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center">
                <span style="font-size:11px; background:var(--pr-bg); color:var(--pr); padding:4px 8px; border-radius:6px; font-weight:800">${p.signs.length} Tabela</span>
                <span style="font-size:10px; color:var(--txt3)">${p.date}</span>
            </div>
        </div>
    `).reverse().join('');
}

function openShare(i) {
    currentProjectIdx = i;
    const p = projects[i];
    document.getElementById('sh-title').textContent = p.project || 'İsimsiz Proje';
    document.getElementById('sh-client').textContent = p.client;
    go('s-share');
}

function buildText() {
    const p = projects[currentProjectIdx];
    let text = `*🏗️ TABERA FIELD PROJE RAPORU*\n\n`;
    text += `*Müşteri:* ${p.client}\n`;
    text += `*Proje:* ${p.project}\n`;
    text += `*Tarih:* ${p.date}\n`;
    text += `\n---------------------------\n`;
    
    p.signs.forEach((s, idx) => {
        text += `\n*${idx+1}. ${s.label}*\n`;
        text += `Type: ${s.type}\n`;
        text += `Ölçü: ${s.w || '?'}m x ${s.h || '?'}m\n`;
        if(s.w && s.h) text += `Alan: ${(s.w * s.h).toFixed(2)} m2\n`;
    });
    
    text += `\n_TaberaField Mobile tarafından oluşturuldu._`;
    return text;
}

function shareWhatsApp() {
    const txt = encodeURIComponent(buildText());
    window.open(`https://wa.me/?text=${txt}`, '_blank');
}

function copyText() {
    navigator.clipboard.writeText(buildText());
    toast("Metin kopyalandı!");
}

function printPDF() {
    const p = projects[currentProjectIdx];
    let html = `
        <div class="pdf-header">
            <div><h1 style="color:var(--pr)">TABERA FIELD</h1><p>Saha Ölçüm & Teknik Rapor</p></div>
            <div style="text-align:right"><strong>Tarih:</strong><br>${p.date}</div>
        </div>
        <div class="pdf-grid">
            <div class="pdf-item"><div class="pdf-label">Müşteri / Firma</div><div class="pdf-val">${p.client}</div></div>
            <div class="pdf-item"><div class="pdf-label">Proje Adı</div><div class="pdf-val">${p.project}</div></div>
        </div>
    `;

    p.signs.forEach((s, idx) => {
        const area = (s.w * s.h).toFixed(2);
        html += `
            <div class="pdf-sign">
                <div class="pdf-s-head"><span>${idx+1}. ${s.label}</span><span>${s.type}</span></div>
                <div class="pdf-s-body">
                    <div class="pdf-measures">
                        <div class="pdf-m-box"><div class="pdf-m-val">${s.w || '-'}</div><div class="pdf-label">GENİŞLİK (M)</div></div>
                        <div class="pdf-m-box"><div class="pdf-m-val">${s.h || '-'}</div><div class="pdf-label">YÜKSEKLİK (M)</div></div>
                        <div class="pdf-m-box"><div class="pdf-m-val" style="color:var(--txt)">${area}</div><div class="pdf-label">ALAN (M2)</div></div>
                    </div>
                    <div class="pgrid">
                        ${s.photos.map(src => `<div class="pthumb"><img src="${src}"></div>`).join('')}
                    </div>
                </div>
            </div>
        `;
    });

    document.getElementById('pdf-content').innerHTML = html;
    const doc = document.getElementById('pdf-doc');
    doc.style.display = 'block';
    setTimeout(() => {
        window.print();
        doc.style.display = 'none';
    }, 500);
}

renderHome();
</script>
</body>
</html>
