<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paprika Reklamcılık Keşif - Düzeltilmiş</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#C0392B; --pr2:#E74C3C; --pr-bg:#FDF2F2; --pr-bd:#F5B7B1;
  --bg:#F2F3F5; --card:#FFFFFF; --card2:#F9FAFB;
  --bd:#E4E7EC; --bd2:#D0D5DD;
  --txt:#101828; --txt2:#344054; --txt3:#667085; --txt4:#98A2B3;
  --sh:0 1px 3px rgba(16,24,40,.1);
  --r:14px; --r2:10px; --r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Nunito',sans-serif;height:100vh;overflow:hidden;}

/* KRİTİK DÜZELTME: Ekranların üst üste binmesini engelleyen yapı */
.scr {
  position:absolute; inset:0; display:flex; flex-direction:column; 
  background:var(--bg); transform:translateX(105%); 
  transition:transform .3s cubic-bezier(.4, 0, .2, 1);
  z-index:1; visibility:hidden; will-change:transform;
}
.scr.active {
  transform:translateX(0); z-index:10; visibility:visible;
}
.scr.behind {
  transform:translateX(-15%); z-index:0; visibility:hidden;
}

.scroll{flex:1; overflow-y:auto; padding-bottom:100px;}
.topbar{background:var(--card); border-bottom:1px solid var(--bd); height:60px; display:flex; align-items:center; padding:0 16px; gap:10px;}
.topbar-title{font-size:17px; font-weight:800; flex:1;}
.topbar-back{width:36px; height:36px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer;}

.pcard, .scard {
  background:var(--card); margin:10px 15px; padding:15px; border-radius:var(--r); 
  border:1px solid var(--bd); box-shadow:var(--sh); position:relative;
}
.edit-btn {
  background:var(--pr-bg); color:var(--pr); padding:5px 12px; border-radius:8px; 
  font-size:12px; font-weight:800; float:right; border:1px solid var(--pr-bd);
}

.fsec{background:var(--card); padding:16px; margin-bottom:10px;}
.if{width:100%; padding:12px; border-radius:var(--r3); border:1px solid var(--bd2); margin-top:5px; font-family:inherit;}
.abtn{width:100%; padding:15px; background:var(--pr); color:#fff; border:none; border-radius:var(--r2); font-weight:800; margin-top:10px;}

.bnav{position:fixed; bottom:0; width:100%; height:70px; background:var(--card); display:flex; border-top:1px solid var(--bd); z-index:100;}
.ni{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--txt4);}
.ni.on{color:var(--pr);}
.pgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;}
.pthumb{aspect-ratio:1; background:#ddd; border-radius:8px; overflow:hidden;}
.pthumb img{width:100%; height:100%; object-fit:cover;}
</style>
</head>
<body>

<div class="app">
  <div class="scr active" id="s-home">
    <div class="topbar"><div class="topbar-title">Paprika <b>Keşif</b></div></div>
    <div class="scroll" id="home-list"></div>
    <div class="bnav">
      <div class="ni on" onclick="go('s-home')">🏠 Ana Sayfa</div>
      <div class="ni" onclick="go('s-share')">📤 Paylaş</div>
    </div>
  </div>

  <div class="scr" id="s-share">
    <div class="topbar">
        <div class="topbar-back" onclick="go('s-home')">←</div>
        <div class="topbar-title">Projeleri Paylaş</div>
    </div>
    <div class="scroll" id="share-list"></div>
  </div>

  <div class="scr" id="s-edit">
    <div class="topbar">
        <div class="topbar-back" onclick="back()">←</div>
        <div class="topbar-title" id="edit-title">Projeyi Düzenle</div>
    </div>
    <div class="scroll">
        <div class="fsec">
            <label>Müşteri Adı</label>
            <input type="text" id="f-client" class="if">
            <br><br>
            <label>Proje Adı</label>
            <input type="text" id="f-project" class="if">
        </div>
        <div class="fsec">
            <div id="pgrid" class="pgrid"></div>
        </div>
        <div style="padding:15px">
            <button class="abtn" onclick="save()">DEĞİŞİKLİKLERİ KAYDET</button>
        </div>
    </div>
  </div>
</div>

<script>
let projects = JSON.parse(localStorage.getItem('paprika_data') || '[]');
let currentId = null;

// GÜÇLENDİRİLMİŞ GEÇİŞ FONKSİYONU
function go(id) {
    const screens = document.querySelectorAll('.scr');
    const target = document.getElementById(id);
    
    screens.forEach(s => {
        s.classList.remove('active');
        s.classList.remove('behind');
        // Ekran aktif değilse tamamen gizle ki arkadan sızmasın
        if(s.id !== id) {
            s.style.visibility = 'hidden';
        }
    });

    target.style.visibility = 'visible';
    target.classList.add('active');
    
    if(id === 's-home') renderHome();
    if(id === 's-share') renderShare();
}

function renderHome() {
    const cont = document.getElementById('home-list');
    cont.innerHTML = projects.map(p => `
        <div class="pcard" onclick="openEdit(${p.id})">
            <b>${p.project}</b><br><small>${p.client}</small>
        </div>
    `).join('');
}

function renderShare() {
    const cont = document.getElementById('share-list');
    cont.innerHTML = projects.map(p => `
        <div class="scard">
            <div class="edit-btn" onclick="openEdit(${p.id})">DÜZENLE</div>
            <b>${p.project}</b><br><small>${p.client}</small>
        </div>
    `).join('');
}

function openEdit(id) {
    const p = projects.find(x => x.id == id);
    if(!p) return;
    currentId = id;
    document.getElementById('f-client').value = p.client;
    document.getElementById('f-project').value = p.project;
    
    // Fotoğrafları yükle
    const grid = document.getElementById('pgrid');
    grid.innerHTML = (p.imgs || []).map(img => `<div class="pthumb"><img src="${img}"></div>`).join('');
    
    go('s-edit'); // Düzenleme ekranına geç
}

function save() {
    const client = document.getElementById('f-client').value;
    const project = document.getElementById('f-project').value;
    
    projects = projects.map(p => p.id == currentId ? {...p, client, project} : p);
    localStorage.setItem('paprika_data', JSON.stringify(projects));
    alert("Güncellendi!");
    go('s-home');
}

function back() {
    go('s-home');
}

// İlk açılış
renderHome();
</script>

</body>
</html>
